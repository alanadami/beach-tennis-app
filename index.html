<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Praça da Encol - Beach Tennis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1b2b;
      --blue-deep: #0f2740;
      --blue-mid: #163a5f;
      --aqua: #3dd6d0;
      --aqua-strong: #5ef7e6;
      --white: #f5f9fb;
      --card: rgba(10, 24, 38, 0.75);
      --border: rgba(61, 214, 208, 0.35);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      color: var(--white);
      background:
        radial-gradient(1100px 600px at 5% -10%, rgba(94, 247, 230, 0.18), transparent 60%),
        radial-gradient(900px 500px at 90% 20%, rgba(61, 214, 208, 0.14), transparent 55%),
        linear-gradient(160deg, var(--navy), var(--blue-deep) 45%, #071625 100%);
      min-height: 100vh;
      padding: 24px 14px 40px;
      padding: calc(24px + env(safe-area-inset-top))
        calc(14px + env(safe-area-inset-right))
        calc(40px + env(safe-area-inset-bottom))
        calc(14px + env(safe-area-inset-left));
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(120deg, rgba(11, 27, 43, 0.95), rgba(11, 27, 43, 0.6));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      right: -90px;
      top: -70px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(94, 247, 230, 0.4), transparent 60%);
      filter: blur(2px);
      pointer-events: none;
    }

    .badge {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: #062326;
      background: linear-gradient(140deg, var(--aqua), var(--aqua-strong));
      box-shadow: 0 10px 20px rgba(61, 214, 208, 0.35);
      margin: 0 auto 12px;
    }

    .hero h1 {
      font-family: 'Oswald', sans-serif;
      letter-spacing: 2px;
      font-size: 38px;
      margin: 0;
      color: var(--aqua-strong);
      text-transform: uppercase;
    }

    .hero p {
      margin: 4px 0 0;
      opacity: 0.85;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      animation: fadeUp 0.6s ease both;
    }

    .card h2, .card h3 {
      font-family: 'Oswald', sans-serif;
      letter-spacing: 1px;
      margin: 0 0 12px;
      color: var(--white);
      text-transform: uppercase;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 18, 30, 0.7);
      color: var(--white);
      font-size: 14px;
      outline: none;
    }

    input::placeholder {
      color: rgba(245, 249, 251, 0.5);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1 1 auto;
    }

    .btn {
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      min-height: 44px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--aqua), var(--aqua-strong));
      color: #071b1f;
      box-shadow: 0 8px 16px rgba(61, 214, 208, 0.3);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(61, 214, 208, 0.35);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .list {
      font-size: 14px;
      line-height: 1.5;
    }

    .list strong {
      color: var(--aqua);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .page {
        gap: 16px;
      }
      .hero {
        padding: 16px;
      }
      .hero h1 {
        font-size: 30px;
      }
      .hero p {
        font-size: 13px;
      }
      .card {
        padding: 16px;
      }
      .grid {
        gap: 16px;
      }
      .row {
        flex-direction: column;
      }
      input, select, .btn {
        width: 100%;
      }
      .btn {
        min-height: 48px;
      }
      .list {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <header class="hero">
      <div>
        <div class="badge">EN</div>
        <h1>Praça da Encol</h1>
        <p>Confirmação rápida para o jogo na praça.</p>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Confirmar presença</h2>

        <label class="field">
          Seu nome
          <input id="nome" placeholder="Digite seu nome" />
        </label>

        <label class="field">
          Horário
          <div class="row">
            <select id="horarioSelect">
              <option value="">Selecione um horário</option>
            </select>
            <button class="btn primary" onclick="confirmarSelecionado()">Confirmar horário</button>
          </div>
        </label>

        <button class="btn ghost" onclick="estouAqui()">📍 Estou aqui agora</button>
      </section>

      <section class="card">
        <h3>Agora</h3>
        <div id="agora" class="list"></div>

        <h3>Hoje</h3>
        <div id="lista" class="list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const SUPABASE_URL = 'https://xipwsuxtwbzdcoavdgwt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_lrzD08WhR5gRG3igGjngxg_o5sX8loc';

    if (!SUPABASE_URL.startsWith('http')) {
      console.error('Supabase URL inválida. Substitua SUPABASE_URL pela URL real do projeto.');
    }

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const TTL_MS = 3 * 60 * 60 * 1000;
    const DIA_TROCA_HORA = 4;

    function formatLocalDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getDiaOperacional() {
      const now = new Date();
      const date = new Date(now);
      if (now.getHours() < DIA_TROCA_HORA) {
        date.setDate(date.getDate() - 1);
      }
      return formatLocalDate(date);
    }

    function getHorarioDate(horario) {
      const [h, m] = horario.split(':').map(Number);
      const [y, mo, d] = getDiaOperacional().split('-').map(Number);
      const date = new Date(y, mo - 1, d, h, m, 0, 0);

      if (h < DIA_TROCA_HORA) {
        date.setDate(date.getDate() + 1);
      }

      return date;
    }

    function getHoraAtual() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    // 🔹 gera horários de 30 em 30 min
    function gerarHorarios() {
      const horarios = [];
      for (let h = 6; h <= 23; h++) {
        horarios.push(`${String(h).padStart(2, '0')}:00`);
        horarios.push(`${String(h).padStart(2, '0')}:30`);
      }
      horarios.push('00:00');
      return horarios;
    }

    const horarios = gerarHorarios();

    // 🔹 preencher select de horários
    window.onload = () => {
      const select = document.getElementById('horarioSelect');
      const nomeSalvo = localStorage.getItem('nome');
      const agora = new Date();

      if (nomeSalvo) {
        document.getElementById('nome').value = nomeSalvo;
      }

      horarios.forEach(h => {
        if (getHorarioDate(h) < agora) {
          return;
        }
        const option = document.createElement('option');
        option.value = h;
        option.textContent = `Vou ${h}`;
        select.appendChild(option);
      });
    };

    function getDeviceId() {
      let id = localStorage.getItem('device_id');
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('device_id', id);
      }
      return id;
    }

    function getNome() {
      const input = document.getElementById('nome');
      const digitado = input.value.trim();
      const salvo = localStorage.getItem('nome') || '';

      if (digitado) {
        localStorage.setItem('nome', digitado);
        return digitado;
      }

      return salvo;
    }

    async function confirmar(horario) {
      const nome = getNome();
      const device_id = getDeviceId();

      if (!nome) {
        alert('Digite seu nome');
        return;
      }

      const horarioDate = getHorarioDate(horario);
      const agora = new Date();
      if (horarioDate < agora) {
        alert('Não é possível marcar um horário no passado.');
        return;
      }

      const { error } = await supabaseClient.from('presencas').insert({
        nome,
        device_id,
        horario,
        status: 'vou',
        data: getDiaOperacional(),
        updated_at: new Date().toISOString()
      });

      if (error) {
        console.error('Erro ao inserir (vou):', error);
        alert('Não foi possível salvar. Veja o erro no console.');
        return;
      }

      carregarDados();
    }

    function confirmarSelecionado() {
      const select = document.getElementById('horarioSelect');
      const horario = select.value;

      if (!horario) {
        alert('Selecione um horário');
        return;
      }

      confirmar(horario);
    }

    async function estouAqui() {
      const nome = getNome();
      const device_id = getDeviceId();

      if (!nome) {
        alert('Digite seu nome');
        return;
      }

      const { error } = await supabaseClient.from('presencas').insert({
        nome,
        device_id,
        status: 'aqui',
        horario: getHoraAtual(),
        data: getDiaOperacional(),
        updated_at: new Date().toISOString()
      });

      if (error) {
        console.error('Erro ao inserir (aqui):', error);
        alert('Não foi possível salvar. Veja o erro no console.');
        return;
      }

      carregarDados();
    }

    async function carregarDados() {
      const cutoffIso = new Date(Date.now() - TTL_MS).toISOString();

      const { data, error } = await supabaseClient
        .from('presencas')
        .select('*')
        .eq('data', getDiaOperacional())
        .gte('updated_at', cutoffIso);

      if (error) {
        console.error(error);
        return;
      }

      renderizar(data);
    }

    function renderizar(dados) {
      const agoraTime = new Date();
      const agoraKeys = new Set();
      const agoraList = [];
      const agendados = [];

      function getKey(p) {
        return `${p.device_id}::${p.nome}`;
      }

      dados.forEach(p => {
        if (p.status === 'aqui') {
          agoraKeys.add(getKey(p));
        }
      });

      dados.forEach(p => {
        const key = getKey(p);

        if (p.status === 'aqui') {
          if (!agoraKeys.has(key)) return;
          if (!agoraList.find(x => x.key === key)) {
            agoraList.push({ key, nome: p.nome });
          }
          return;
        }

        if (p.status === 'vou') {
          if (agoraKeys.has(key)) {
            return;
          }

          if (!p.horario) {
            return;
          }

          const horarioDate = getHorarioDate(p.horario);
          if (horarioDate <= agoraTime) {
            if (!agoraList.find(x => x.key === key)) {
              agoraList.push({ key, nome: p.nome });
            }
          } else {
            agendados.push(p);
          }
        }
      });

      document.getElementById('agora').innerHTML =
        `👥 ${agoraList.length} jogando agora<br/>
         ${agoraList.map(p => p.nome).join(', ')}`;

      let html = '';

      horarios.forEach(h => {
        const pessoas = agendados.filter(p => p.horario === h);

        if (pessoas.length > 0) {
          html += `<div>
            <strong>${h}</strong> → ${pessoas.length} pessoas<br/>
            ${pessoas.map(p => p.nome).join(', ')}
          </div><br/>`;
        }
      });

      document.getElementById('lista').innerHTML = html || 'Ninguém confirmado ainda';
    }

    carregarDados();
    setInterval(carregarDados, 10000);
  </script>

</body>
</html>
